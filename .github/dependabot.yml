version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    labels:
      - "deps"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    labels:
      - "deps"
      - "ci"
    commit-message:
      prefix: "chore"
      include: "scope"
