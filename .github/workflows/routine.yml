name: Repository Routines

on:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches: [main]
    paths:
      - .github/labels.yml
  workflow_dispatch:
    inputs:
      routine:
        description: Routine to run
        type: choice
        options:
          - all
          - branch-cleanup-stale
          - stale-pr
          - stale-issue
          - labels-sync
          - workflow-runs-cleanup
        default: all
      dry_run:
        description: Preview changes without applying them
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  routine:
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/routine.yml@v1.36.6
    with:
      routine: ${{ inputs.routine || 'all' }}
      dry_run: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
      merged_branch: ${{ github.head_ref }}
