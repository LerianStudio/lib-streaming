name: PR Validation

on:
  pull_request:
    branches: [develop, release-candidate, main]
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  validate:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/pr-validation.yml@v1.33.0
    with:
      enforce_source_branches: true
      allowed_source_branches: 'develop|release-candidate|hotfix/*'
      target_branches_for_source_check: 'main'
      pr_title_scopes: |
        ci
        config
        deps
        docs
        examples
        health
        lifecycle
        metrics
        outbox
        producer
        publish
        scripts
        streaming
        tests
