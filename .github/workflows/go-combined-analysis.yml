name: Go Combined Analysis

on:
  pull_request:
    branches: [develop, release-candidate, main]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

jobs:
  go-analysis:
    name: Go Analysis
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/go-pr-analysis.yml@v1.28.5
    with:
      go_version: "1.25.9"
      golangci_lint_version: "v2.9.0"
      fail_on_coverage_threshold: true
      go_private_modules: "github.com/LerianStudio/*"
    secrets: inherit
